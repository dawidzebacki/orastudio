# ORA.studio — konfiguracja deployu na Netlify (statyczny Astro).
# Netlify importuje to z repo przy podłączeniu site → build jest deterministyczny.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro 5 wymaga Node 18.20.8+ / 20.3+ / 22+. Pinujemy LTS dla powtarzalności.
  NODE_VERSION = "20"
